name: Tests

on:
  push:
    branches:
      - main
      - development
  pull_request:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.4]

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Create Framework Directories
        run: |
          cd sources
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p bootstrap/cache
          chmod -R 775 storage bootstrap/cache
          mkdir -p database
          touch database/database.sqlite

      - name: Copy environment file & Set Config
        run: |
          cd sources
          cp .env.example .env
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/' .env
          # Suntik URL localhost biar Guzzle HTTP nggak panic
          sed -i 's/^APP_URL=.*/APP_URL=http:\/\/localhost/' .env

      - name: Install Composer dependencies
        run: |
          cd sources
          # Tambahkan --no-scripts biar Composer nggak langsung nge-boot Laravel
          composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Generate app key & Discover Packages
        run: |
          cd sources
          php artisan key:generate
          # Jalankan discover secara manual setelah env aman
          php artisan package:discover

      - name: Execute tests
        run: |
          cd sources
          php artisan test
