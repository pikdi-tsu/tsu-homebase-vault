name: deploy.yml
on:
  push:
    branches:
      - main # Otomatis deploy setiap ada push/merge ke branch main

jobs:
  web-deploy:
    name: Fast Deploy to DirectAdmin
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync Core files to DirectAdmin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: sources/
          server-dir: /domains/homebase.tsu.ac.id/tsu_homebase_core/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
            *.sqlite
            phpunit.xml
            vendor/**
            resources/css/**
            resources/js/**
            vite.config.js
            tailwind.config.js
            postcss.config.js
            package.json
            package-lock.json
            node_modules/**
            .idea/**
            .vscode/**
            .DS_Store
            storage/logs/*.log

      - name: Sync Public files to DirectAdmin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /domains/homebase.tsu.ac.id/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
            sources/**
            .idea/**
            .vscode/**
            .DS_Store

      - name: Execute Server Scripts via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_NAME: ${{ secrets.APP_NAME }}
          APP_URL: ${{ secrets.APP_URL }}
          ASSET_URL: ${{ secrets.ASSET_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          debug: true
          envs: APP_NAME,APP_URL,FRONTEND_URL,DB_HOST,DB_PORT,DB_DATABASE,DB_USERNAME,DB_PASSWORD
          script: |
            set -e
            cd domains/homebase.tsu.ac.id/tsu_homebase_core
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p bootstrap/cache
            mkdir -p resources/js
            touch resources/js/custom-filament.js

            if [ ! -f .env ]; then cp .env.example .env; fi
            touch database/database.sqlite

            # Bersihkan variabel Secrets dari karakter spasi/enter tersembunyi (CR/LF)
            APP_NAME=$(echo "$APP_NAME" | tr -d '\r\n') # Spasi pada nama aplikasi diizinkan
            APP_URL=$(echo "$APP_URL" | tr -d '\r\n ')
            ASSET_URL=$(echo "$ASSET_URL" | tr -d '\r\n ')
            FRONTEND_URL=$(echo "$FRONTEND_URL" | tr -d '\r\n ')
            DB_HOST=$(echo "$DB_HOST" | tr -d '\r\n ')
            DB_PORT=$(echo "$DB_PORT" | tr -d '\r\n ')
            DB_DATABASE=$(echo "$DB_DATABASE" | tr -d '\r\n ')
            DB_USERNAME=$(echo "$DB_USERNAME" | tr -d '\r\n ')
            DB_PASSWORD=$(echo "$DB_PASSWORD" | tr -d '\r\n') # Jangan hapus spasi pada password

            # Fungsi aman untuk update .env dengan tanda petik
            update_env() {
                local key=$1
                local val=$2
                if [ -n "$val" ]; then
                    local escaped_val=$(echo "$val" | sed 's/"/\\"/g')
                    if grep -q "^${key}=" .env; then
                        sed -i "s|^${key}=.*|${key}=\"${escaped_val}\"|" .env
                    else
                        echo "${key}=\"${escaped_val}\"" >> .env
                    fi
                fi
            }

            # Set Config otomatis via Secrets
            update_env "APP_NAME" "$APP_NAME"
            update_env "APP_URL" "$APP_URL"
            update_env "ASSET_URL" "$ASSET_URL"
            update_env "FRONTEND_URL" "$FRONTEND_URL"
            update_env "DB_HOST" "$DB_HOST"
            update_env "DB_PORT" "$DB_PORT"
            update_env "DB_DATABASE" "$DB_DATABASE"
            update_env "DB_USERNAME" "$DB_USERNAME"
            update_env "DB_PASSWORD" "$DB_PASSWORD"

            wget -O composer.phar https://getcomposer.org/download/latest-stable/composer.phar
            export COMPOSER_ALLOW_SUPERUSER=1
            php composer.phar install --ignore-platform-reqs --no-dev --optimize-autoloader

            # Generate APP_KEY jika masih kosong
            if grep -q "^APP_KEY=$" .env; then
                php artisan key:generate --force
            fi

            # Optimasi Framework
            php artisan optimize:clear
            php artisan optimize
            php artisan view:cache
            php artisan filament:optimize
            php artisan storage:link

            # Memastikan hak akses folder cache dan log aman SETELAH semua file tergenerate
            # Di DirectAdmin kita gunakan 755 agar tidak diblokir oleh suPHP/lsphp
            chmod -R 755 storage bootstrap/cache
            chmod 600 storage/*.key 2>/dev/null || true
