name: deploy.yml
on:
  push:
    branches:
      - main # Otomatis deploy setiap ada push/merge ke branch main

jobs:
  web-deploy:
    name: Fast Deploy to DirectAdmin
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync Core files to DirectAdmin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: sources/
          server-dir: /domains/homebase.tsu.ac.id/tsu_homebase_core/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
            *.sqlite
            phpunit.xml
            vendor/**
            resources/css/**
            resources/js/**
            vite.config.js
            tailwind.config.js
            postcss.config.js
            package.json
            package-lock.json
            node_modules/**
            .idea/**
            .vscode/**
            .DS_Store
            storage/logs/*.log

      - name: Sync Public files to DirectAdmin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /domains/homebase.tsu.ac.id/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
            sources/**
            .idea/**
            .vscode/**
            .DS_Store

      - name: Execute Server Scripts via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          debug: true
          script: |
            set -e
            cd domains/homebase.tsu.ac.id/tsu_homebase_core
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p bootstrap/cache
            chmod -R 775 storage bootstrap/cache
            mkdir -p resources/js
            touch resources/js/custom-filament.js
            wget -O composer.phar https://getcomposer.org/download/latest-stable/composer.phar
            php composer.phar install --no-dev --optimize-autoloader
            php artisan optimize:clear
            php artisan optimize
            php artisan storage:link