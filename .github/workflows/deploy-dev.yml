name: Deploy to VPS (Development)

on:
  push:
    branches:
      - development

jobs:
  web-deploy:
    name: Fast Deploy to VPS via Rsync
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync files to VPS (Rsync over SSH)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.DEV_SSH_HOST }}
          REMOTE_USER: ${{ secrets.DEV_SSH_USERNAME }}
          TARGET: /var/www/html/tsu_homebase/
          EXCLUDE: "/.git/, /.github/, /sources/node_modules/, *.sqlite, /sources/vendor/"

      - name: Execute Post-Deploy Scripts via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_URL: ${{ secrets.DEV_APP_URL }}
          DB_HOST: ${{ secrets.DEV_DB_HOST }}
          DB_PORT: ${{ secrets.DEV_DB_PORT }}
          DB_DATABASE: ${{ secrets.DEV_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DEV_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USERNAME }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: 22
          envs: APP_URL,DB_HOST,DB_PORT,DB_DATABASE,DB_USERNAME,DB_PASSWORD
          script: |
            set -e
            # Melompat tepat ke jantung aplikasi
            cd /var/www/html/tsu_homebase/sources 

            # Pastikan folder penyimpanan ada secara eksplisit
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p bootstrap/cache
            mkdir -p resources/js
            touch resources/js/custom-filament.js

            # Install dependensi PHP memakai composer.phar agar konsisten dengan production
            wget -O composer.phar https://getcomposer.org/download/latest-stable/composer.phar
            export COMPOSER_ALLOW_SUPERUSER=1
            php composer.phar install --ignore-platform-reqs --no-interaction --prefer-dist --optimize-autoloader

            # Memastikan hak akses folder cache dan log aman. 
            # (Jika server 202 pakai user 'bertha' untuk web servernya, ganti www-data menjadi bertha)
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache
            
            if [ ! -f .env ]; then cp .env.example .env; fi
            touch database/database.sqlite
            
            # Set Config otomatis via Secrets
            if [ -n "$APP_URL" ]; then sed -i "s|^APP_URL=.*|APP_URL=$APP_URL|" .env; fi
            if [ -n "$DB_HOST" ]; then sed -i "s|^DB_HOST=.*|DB_HOST=$DB_HOST|" .env; fi
            if [ -n "$DB_PORT" ]; then sed -i "s|^DB_PORT=.*|DB_PORT=$DB_PORT|" .env; fi
            if [ -n "$DB_DATABASE" ]; then sed -i "s|^DB_DATABASE=.*|DB_DATABASE=$DB_DATABASE|" .env; fi
            if [ -n "$DB_USERNAME" ]; then sed -i "s|^DB_USERNAME=.*|DB_USERNAME=$DB_USERNAME|" .env; fi
            if [ -n "$DB_PASSWORD" ]; then sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=$DB_PASSWORD|" .env; fi

            # Generate APP_KEY jika masih kosong
            if grep -q "^APP_KEY=$" .env; then
                php artisan key:generate --force
            fi

            # Optimasi Framework
            php artisan optimize:clear
            php artisan optimize
            php artisan view:cache
            php artisan filament:optimize
            php artisan storage:link

            # Migrasi Database
            php artisan migrate --force
